<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog Preview Card</title>

  <!-- Font Awesome CDN -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="preview-container">
    <div class="preview-img">
      <img src="/Blog Preview Card/assets/images/illustration-article.svg" alt="">
    </div>
    <div class="preview-card-text">
      <div class="learning"><h4>Learning</h4></div>
      <p class="published-text">Published 21 Dec 2023</p>
      <a href="#"><p class="blog-title">HTML & CSS foundations</p></a>
      <p class="preview-text">These languges are the backbone of every website, defining structure, content, and presentation.</p>
    </div>
    <div class="blog-img-container">
      <img src="/Blog Preview Card/assets/images/image-avatar.webp" alt="blog-img">
      <p>Greg Hooper</p>
    </div>
    
  </div>
</body>

</html>
